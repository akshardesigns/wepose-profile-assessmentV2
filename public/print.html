<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WEPOSE — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/report.css">
<style>
  /* print.html tidak butuh app-shell sama sekali — cuma halaman laporan */
  html, body{background:#fff !important;}
</style>
</head>
<body>
<div id="pages"></div>

<script src="/js/report.js"></script>
<script>
(async function () {
  function getToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
  }

  async function getState() {
    // Cara baru (Vercel-safe): state di-inject langsung oleh Puppeteer
    // sebelum halaman ini dimuat, jadi tidak perlu request tambahan.
    if (window.__WEPOSE_STATE__) return window.__WEPOSE_STATE__;

    // Fallback lama (dipakai kalau print.html dibuka manual dengan ?token=...
    // saat development lokal single-process).
    const token = getToken();
    if (!token) throw new Error('Data laporan tidak ditemukan.');
    const res = await fetch('/api/render-data/' + encodeURIComponent(token));
    if (!res.ok) throw new Error('Data render tidak ditemukan (token kedaluwarsa atau salah).');
    return res.json();
  }

  async function main() {
    try {
      const state = await getState();

      document.getElementById('pages').innerHTML = WeposeReport.renderAllPagesHTML(state);

      // tunggu font + gambar (logo/spiral/gajah/foto) selesai dimuat
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready.catch(() => {});
      }
      await WeposeReport.waitForImages(document);

      // beri waktu sedikit biar layout benar-benar settle sebelum diukur
      await new Promise(r => setTimeout(r, 100));
      WeposeReport.autofitAll(document);
      await new Promise(r => setTimeout(r, 100));

      window.__PDF_READY__ = true;
    } catch (err) {
      console.error(err);
      document.body.innerHTML = '<p style="padding:20px;font-family:sans-serif;">Gagal render: ' + (err && err.message ? err.message : err) + '</p>';
      window.__PDF_READY__ = true;
      window.__PDF_ERROR__ = String(err && err.message ? err.message : err);
    }
  }

  main();
})();
</script>
</body>
</html>
